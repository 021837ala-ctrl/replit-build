name: Android Build (Google Play AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB
        working-directory: artifacts/rawabi-menu
        run: eas build --platform android --profile production --non-interactive --no-wait

      - name: Print build URL
        run: |
          echo "https://expo.dev/accounts/021837ala/projects/rawabi-menu/builds"
