name: Android Build (Google Play AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB
        working-directory: artifacts/rawabi-menu
        run: eas build --platform android --profile production --non-interactive --no-wait

      - name: Print build URL
        run: |
          echo "======================================"
          echo "Build started on Expo servers."
          echo "Track your build at:"
          echo "https://expo.dev/accounts/021837ala/projects/rawabi-menu/builds"
          echo "======================================"
